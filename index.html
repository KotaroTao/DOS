<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b0b12" />
  <title>地下迷宮 - Dungeon of Shadows</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>地下迷宮 <span class="sub">Dungeon of Shadows</span></h1>
      <div id="floor-info">B1F</div>
    </header>

    <main id="screen">
      <!-- カードボード / 戦闘ビュー -->
      <canvas id="view" width="480" height="320"></canvas>

      <!-- メッセージ -->
      <section id="hud">
        <div id="log" aria-live="polite"></div>
      </section>
    </main>

    <!-- パーティステータス -->
    <section id="party"></section>

    <!-- 操作系 -->
    <section id="controls">
      <div id="move-pad">
        <button class="btn" data-act="up">▲ 上</button>
        <button class="btn" data-act="left">◀ 左</button>
        <button class="btn" data-act="down">▼ 下</button>
        <button class="btn" data-act="right">右 ▶</button>
      </div>
      <div id="combat-menu" class="hidden"></div>
    </section>

    <footer id="hint">
      矢印キーで隣のカードへ移動 ・ 裏向きのカードはめくられる ・ 戦闘中はボタンで選択
    </footer>
  </div>

  <script type="module" src="src/game.js"></script>
</body>
</html>
