<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>百の迷宮と 魂の王 - Hundred Labyrinths: Rise of the Soul King</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="topbar-left">
        <button id="settings-btn" title="設定">⚙</button>
        <button id="return-btn" title="帰還魔法陣から街へ戻る" class="hidden"></button>
        <button id="descend-btn" title="階段を降りる" class="hidden" disabled></button>
      </div>
      <div id="floor-info">街</div>
      <div id="topbar-cur"></div>
    </header>

    <!-- 街 (拠点) 画面 (オーバーレイ) -->
    <div id="town-screen" class="hidden"></div>

    <!-- 個別ステータス / 装備画面 (オーバーレイ) -->
    <div id="status-screen" class="hidden"></div>

    <!-- 設定画面 (オーバーレイ) -->
    <div id="settings-screen" class="hidden"></div>

    <!-- アイテム入手 / イベント演出 (共通オーバーレイ) -->
    <div id="item-get" class="hidden"></div>

    <main id="screen">
      <!-- カードボード / 戦闘ビュー -->
      <canvas id="view" width="480" height="320"></canvas>
    </main>

    <!-- メッセージ -->
    <section id="hud">
      <div id="log" aria-live="polite"></div>
    </section>

    <!-- パーティステータス -->
    <section id="party"></section>

    <!-- 戦闘コマンドメニュー -->
    <section id="controls">
      <div id="combat-menu" class="hidden"></div>
    </section>

    <footer id="hint">
      スワイプで移動 ・ タップで移動先指定 ・ 青枠はめくれるカード
    </footer>
  </div>

  <!-- 起動エラーの可視化と自己修復 (白画面のまま固まらないように) -->
  <script>
    (function () {
      var shown = false;
      function showFatal(msg) {
        if (shown) return; shown = true;
        var d = document.createElement("div");
        d.style.cssText = "position:fixed;inset:0;z-index:9999;background:#0b0b12;color:#e7e3d4;" +
          "display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;" +
          "padding:24px;text-align:center;font-family:monospace";
        var h = document.createElement("div");
        h.textContent = "⚠ 読み込みに失敗しました";
        h.style.cssText = "font-size:18px;color:#ff9a98;font-weight:bold";
        var m = document.createElement("div");
        m.textContent = msg || "";
        m.style.cssText = "font-size:11px;color:#9b97a8;max-width:420px;word-break:break-all";
        var b = document.createElement("button");
        b.textContent = "キャッシュを消して再読み込み";
        b.style.cssText = "font-size:15px;padding:14px 22px;border-radius:8px;border:1px solid #c9a227;" +
          "background:#1d1d2b;color:#ffd84a;font-family:monospace";
        b.onclick = function () {
          b.disabled = true; b.textContent = "修復中…";
          var work = [];
          try { localStorage.removeItem("dos-save-v1"); } catch (e) {}
          if (window.caches && caches.keys) work.push(caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); }));
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) work.push(navigator.serviceWorker.getRegistrations().then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); }));
          Promise.all(work).catch(function () {}).then(function () { location.reload(); });
        };
        d.appendChild(h); d.appendChild(m); d.appendChild(b);
        document.body.appendChild(d);
      }
      // モジュール読み込み失敗 (export不一致など) は error イベントに乗る
      window.addEventListener("error", function (ev) {
        var msg = ev.message || (ev.error && ev.error.message) || "";
        // ゲームが一度でも起動していれば軽微なエラーは握りつぶさない (ログのみ)
        if (!window.__game) showFatal(msg);
      });
      window.addEventListener("unhandledrejection", function (ev) {
        if (!window.__game) showFatal(ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason || ""));
      });
      // 5秒たっても起動フックが立たない場合も修復画面を出す
      setTimeout(function () { if (!window.__game) showFatal("起動がタイムアウトしました (キャッシュ不整合の可能性)"); }, 5000);
    })();
  </script>
  <script type="module" src="src/game.js"></script>
</body>
</html>
