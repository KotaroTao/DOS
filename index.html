<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>魂の迷宮 - Dungeon of Souls</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>魂の迷宮 <span class="sub">Dungeon of Souls</span></h1>
      <div class="topbar-right">
        <div id="floor-info">街</div>
        <button id="town-btn" title="街へ戻る" class="hidden">🏚</button>
        <button id="status-btn" title="ステータス・装備">👤</button>
        <button id="mute-btn" title="音のオン/オフ (M)">🔊</button>
      </div>
    </header>

    <!-- 街 (拠点) 画面 (オーバーレイ) -->
    <div id="town-screen" class="hidden"></div>

    <!-- 個別ステータス / 装備画面 (オーバーレイ) -->
    <div id="status-screen" class="hidden"></div>

    <!-- アイテム入手 / イベント演出 (共通オーバーレイ) -->
    <div id="item-get" class="hidden"></div>

    <main id="screen">
      <!-- カードボード / 戦闘ビュー -->
      <canvas id="view" width="480" height="320"></canvas>
    </main>

    <!-- メッセージ -->
    <section id="hud">
      <div id="log" aria-live="polite"></div>
    </section>

    <!-- パーティステータス -->
    <section id="party"></section>

    <!-- 戦闘コマンドメニュー -->
    <section id="controls">
      <div id="combat-menu" class="hidden"></div>
    </section>

    <footer id="hint">
      スワイプで移動 ・ タップで移動先指定 ・ 青枠は移動できるマス
    </footer>
  </div>

  <script type="module" src="src/game.js"></script>
</body>
</html>
