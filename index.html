<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>地下迷宮 - Dungeon of Shadows</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>地下迷宮 <span class="sub">Dungeon of Shadows</span></h1>
      <div class="topbar-right">
        <div id="floor-info">B1F</div>
        <button id="status-btn" title="ステータス・装備">👤</button>
        <button id="mute-btn" title="音のオン/オフ (M)">🔊</button>
      </div>
    </header>

    <!-- 個別ステータス / 装備画面 (オーバーレイ) -->
    <div id="status-screen" class="hidden"></div>

    <!-- アイテム入手 / イベント演出 (共通オーバーレイ) -->
    <div id="item-get" class="hidden"></div>

    <main id="screen">
      <!-- カードボード / 戦闘ビュー -->
      <canvas id="view" width="480" height="320"></canvas>
    </main>

    <!-- メッセージ -->
    <section id="hud">
      <div id="log" aria-live="polite"></div>
    </section>

    <!-- パーティステータス -->
    <section id="party"></section>

    <!-- 操作系 -->
    <section id="controls">
      <div id="move-pad" aria-label="移動">
        <button class="btn dpad" data-act="up" aria-label="上へ">▲</button>
        <button class="btn dpad" data-act="left" aria-label="左へ">◀</button>
        <button class="btn dpad" data-act="down" aria-label="下へ">▼</button>
        <button class="btn dpad" data-act="right" aria-label="右へ">▶</button>
      </div>
      <div id="combat-menu" class="hidden"></div>
    </section>

    <footer id="hint">
      行きたいマスをタップ ・ 青枠は隣の移動先 ・ 離れたマスは経路で自動移動
    </footer>
  </div>

  <script type="module" src="src/game.js"></script>
</body>
</html>
